{{ $page := .page }}

<article>
  <a href="{{ $page.RelPermalink }}" 
     class="flex flex-col gap-1 py-3 border-b border-border transition-colors duration-200"
     onmouseover="this.querySelector('span').style.color='var(--color-primary)'"
     onmouseout="this.querySelector('span').style.color=''">
    <span class="text-foreground font-medium leading-snug" style="transition: color 0.2s">
      {{ $page.Title }}
    </span>
    <div class="flex items-center gap-3 text-sm text-muted-foreground">
      <time datetime="{{ $page.Date.Format "2006-01-02" }}">
        {{ $page.Date.Format "2006" }}
      </time>
      {{ if $page.ReadingTime }}
        <span>{{ $page.ReadingTime }} min read</span>
      {{ end }}
    </div>
  </a>
</article>
