{{/* quick links - 3 tab buttons */}}
<div class="flex justify-center gap-4 mb-6">
  <button onclick="showSection('home')" id="btn-home"
    class="text-primary-foreground bg-primary inline-flex items-center rounded-xl px-6 py-3 font-semibold transition-all duration-300 ease-out hover:-translate-y-1 hover:scale-105">
    Home
  </button>
  <button onclick="showSection('about')" id="btn-about"
    class="text-muted-foreground bg-muted/50 hover:text-primary hover:bg-primary/10 inline-flex items-center rounded-xl px-6 py-3 font-semibold transition-all duration-300 ease-out hover:-translate-y-1 hover:scale-105">
    About Me
  </button>
  <button onclick="showSection('resume')" id="btn-resume"
    class="text-muted-foreground bg-muted/50 hover:text-primary hover:bg-primary/10 inline-flex items-center rounded-xl px-6 py-3 font-semibold transition-all duration-300 ease-out hover:-translate-y-1 hover:scale-105">
    Resume
  </button>
</div>

<script>
function showSection(section) {
  var sections = ['home', 'about', 'resume'];
  var active = 'text-primary-foreground bg-primary inline-flex items-center rounded-xl px-6 py-3 font-semibold transition-all duration-300 ease-out hover:-translate-y-1 hover:scale-105';
  var inactive = 'text-muted-foreground bg-muted/50 hover:text-primary hover:bg-primary/10 inline-flex items-center rounded-xl px-6 py-3 font-semibold transition-all duration-300 ease-out hover:-translate-y-1 hover:scale-105';
  sections.forEach(function(s) {
    document.getElementById(s + '-content').style.display = s === section ? 'block' : 'none';
    document.getElementById('btn-' + s).className = s === section ? active : inactive;
  });
}
</script>
